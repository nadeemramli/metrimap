#cloud-config
# First-boot setup for the Metrimap MCP VPS: Docker + firewall. The app itself is
# deployed by deploy.sh (rsync repo → docker compose up).
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - git
  - rsync
  - ufw
runcmd:
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - mkdir -p /opt/metrimap
